<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background: #F6F2EA; padding: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { border-radius: 12px; border: 2px solid #2A2826; box-shadow: 3px 3px 0 #2A2826; overflow: hidden; }
  .color-block { height: 70px; width: 120px; }
  .label { padding: 8px 10px; background: white; }
  .label .name { font-weight: 800; font-size: 12px; color: #2A2826; }
  .label .hex  { font-size: 11px; color: #4A4542; font-weight: 600; }
  .label .role { font-size: 10px; color: #9B6EA8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="swatch"><div class="color-block" style="background:#F6F2EA"></div><div class="label"><div class="role">bg</div><div class="name">Cream</div><div class="hex">#F6F2EA</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#EDE8DC"></div><div class="label"><div class="role">bg-sunken</div><div class="name">Cream Dark</div><div class="hex">#EDE8DC</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#FFFFFF; border-bottom: 1px solid #eee;"></div><div class="label"><div class="role">bg-raised</div><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#2A2826"></div><div class="label"><div class="role">fg / border</div><div class="name">Charcoal</div><div class="hex">#2A2826</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#4A4542"></div><div class="label"><div class="role">fg-muted</div><div class="name">Charcoal Soft</div><div class="hex">#4A4542</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#D4B4D8"></div><div class="label"><div class="role">primary</div><div class="name">Lilac 200</div><div class="hex">#D4B4D8</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#9B6EA8"></div><div class="label"><div class="role">primary-dark</div><div class="name">Lilac 500</div><div class="hex">#9B6EA8</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#6B8F80"></div><div class="label"><div class="role">secondary</div><div class="name">Sage 400</div><div class="hex">#6B8F80</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#C9B87A"></div><div class="label"><div class="role">accent</div><div class="name">Tan 300</div><div class="hex">#C9B87A</div></div></div>
</body>
</html>
