<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:#D4B4D8; padding:32px; display:flex; flex-direction:column; align-items:center; gap:24px; }

  .logo-row { display:flex; gap:24px; align-items:center; }
  .logo-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .logo-bg { border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #2A2826; box-shadow:4px 4px 0 #2A2826; overflow:hidden; }
  .logo-bg img { width:100%; height:100%; object-fit:cover; }
  .logo-label { font-size:10px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:#5E3C68; }

  .wordmark { font-family:'Nunito',sans-serif; font-weight:900; color:#2A2826; letter-spacing:-0.02em; }

  .lockup { display:flex; align-items:center; gap:12px; background:white; border:2px solid #2A2826; border-radius:16px; padding:12px 20px; box-shadow:4px 4px 0 #2A2826; }

  .on-dark { background:#2A2826; border-radius:12px; padding:16px 24px; display:flex; align-items:center; gap:12px; }
</style>
</head>
<body>
  <!-- Logo sizes -->
  <div class="logo-row">
    <div class="logo-wrap">
      <div class="logo-bg" style="width:40px;height:40px"><img src="../assets/logo.png" alt="Kodeaben"></div>
      <div class="logo-label">40px</div>
    </div>
    <div class="logo-wrap">
      <div class="logo-bg" style="width:64px;height:64px"><img src="../assets/logo.png" alt="Kodeaben"></div>
      <div class="logo-label">64px</div>
    </div>
    <div class="logo-wrap">
      <div class="logo-bg" style="width:96px;height:96px"><img src="../assets/logo.png" alt="Kodeaben"></div>
      <div class="logo-label">96px</div>
    </div>
    <div class="logo-wrap">
      <div class="logo-bg" style="width:128px;height:128px"><img src="../assets/logo.png" alt="Kodeaben"></div>
      <div class="logo-label">128px</div>
    </div>
  </div>

  <!-- Lockup: logo + wordmark -->
  <div class="lockup">
    <div class="logo-bg" style="width:48px;height:48px;border-color:#2A2826;box-shadow:none"><img src="../assets/logo.png" alt=""></div>
    <span class="wordmark" style="font-size:28px">kodeaben</span>
  </div>

  <!-- On dark background -->
  <div class="on-dark">
    <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid #D4B4D8"><img src="../assets/logo.png" style="width:100%;height:100%;object-fit:cover"></div>
    <span class="wordmark" style="font-size:24px;color:#F6F2EA">kodeaben</span>
  </div>
</body>
</html>
