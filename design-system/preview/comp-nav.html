<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:#F6F2EA; padding:24px 28px; color:#2A2826; display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  .meta { font-size:10px; font-weight:800; color:#9B6EA8; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; }

  /* Nav */
  .navbar { display:flex; align-items:center; gap:0; background:white; border:2px solid #2A2826; border-radius:16px; box-shadow:4px 4px 0 #2A2826; padding:6px 10px; gap:4px; width:560px; }
  .nav-logo { width:32px; height:32px; border-radius:50%; overflow:hidden; border:2px solid #2A2826; flex-shrink:0; }
  .nav-logo img { width:100%; height:100%; object-fit:cover; }
  .nav-brand { font-weight:900; font-size:15px; letter-spacing:-0.01em; margin-left:8px; margin-right:16px; }
  .nav-link { font-size:13px; font-weight:700; padding:5px 10px; border-radius:8px; cursor:pointer; transition:all 150ms; color:#4A4542; }
  .nav-link:hover { background:#F0E8CC; color:#2A2826; }
  .nav-link.active { background:#D4B4D8; color:#2A2826; border:2px solid #2A2826; }
  .nav-spacer { flex:1; }
  .nav-btn { font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; background:#2A2826; color:#F6F2EA; border:2px solid #2A2826; border-radius:8px; padding:5px 14px; cursor:pointer; box-shadow:2px 2px 0 #9B6EA8; }

  /* Sidebar */
  .sidebar { width:160px; background:white; border:2px solid #2A2826; border-radius:16px; box-shadow:4px 4px 0 #2A2826; padding:12px 10px; display:flex; flex-direction:column; gap:2px; }
  .sidebar-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; color:#4A4542; transition:all 150ms; }
  .sidebar-item:hover { background:#F0E8CC; color:#2A2826; }
  .sidebar-item.active { background:#D4B4D8; color:#2A2826; border:2px solid #2A2826; }
  .sidebar-item svg { flex-shrink:0; }
  .sidebar-section { font-size:9px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:#A09890; padding:8px 10px 3px; }

  /* Alert / Toast */
  .alert { display:flex; align-items:flex-start; gap:10px; border:2px solid #2A2826; border-radius:12px; padding:12px 14px; box-shadow:3px 3px 0 #2A2826; width:280px; }
  .alert-icon { flex-shrink:0; width:22px; height:22px; border-radius:6px; border:2px solid #2A2826; display:flex; align-items:center; justify-content:center; }
  .alert-title { font-size:13px; font-weight:800; margin-bottom:2px; }
  .alert-desc { font-size:11px; font-weight:500; color:#4A4542; line-height:1.4; }
</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div class="meta">Navigation bar</div>
    <div class="navbar">
      <div class="nav-logo"><img src="../assets/logo.png" alt=""></div>
      <span class="nav-brand">kodeaben</span>
      <span class="nav-link active">Home</span>
      <span class="nav-link">Work</span>
      <span class="nav-link">Blog</span>
      <span class="nav-link">About</span>
      <div class="nav-spacer"></div>
      <button class="nav-btn">Get in touch</button>
    </div>

    <div class="meta" style="margin-top:4px">Alerts</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="alert" style="background:#d1f5e0">
        <div class="alert-icon" style="background:#bbf7d0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div><div class="alert-title">All good!</div><div class="alert-desc">Your changes were saved successfully.</div></div>
      </div>
      <div class="alert" style="background:#fee2e2">
        <div class="alert-icon" style="background:#fecaca"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
        <div><div class="alert-title">Something went wrong</div><div class="alert-desc">Please check your input and try again.</div></div>
      </div>
      <div class="alert" style="background:#EDE0F0">
        <div class="alert-icon" style="background:#D4B4D8"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7D538A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div><div class="alert-title">Heads up</div><div class="alert-desc">This feature is in early access.</div></div>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:14px;">
    <div class="meta">Sidebar nav</div>
    <div class="sidebar">
      <div class="sidebar-section">Main</div>
      <div class="sidebar-item active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2A2826" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4A4542" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Projects
      </div>
      <div class="sidebar-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4A4542" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Team
      </div>
      <div class="sidebar-section">Settings</div>
      <div class="sidebar-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4A4542" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        Settings
      </div>
    </div>
  </div>
</body>
</html>
